<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Reference - Data Portfolio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* Specific Grid Layout for this page */
    .qr-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
    }

    .qr-btn {
      background-color: rgba(13, 110, 253, 0.08);
      border: 1px solid var(--shadow-color);
      color: var(--text-color);
      padding: 12px 15px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      text-align: center;
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .qr-btn:hover {
      background-color: var(--btn-bg);
      color: var(--btn-text);
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(13, 110, 253, 0.2);
      border-color: var(--btn-bg);
    }

    /* Dark Mode specific rules */
    body.dark-mode .qr-btn {
      background-color: var(--header-bg);
    }

    body.dark-mode .qr-btn:hover {
      background-color: var(--btn-bg);
    }
  </style>
</head>
<body>

  <header class="top-header">
    <div class="logo-section">
      <a href="../index.html" title="Back to Home"><i class="fas fa-arrow-left"></i> Home</a>
    </div>
    <div class="quote-section">
      <p id="quote-display">"Talk is cheap. Show me the code. – Linus Torvalds"</p>
    </div>
    <div class="info-section">
      <button id="theme-toggle" title="Toggle Dark/Light Mode"><i class="fas fa-moon"></i></button>
      <div class="time-weather">
        <span id="time-display">--:--:--</span>
      </div>
    </div>
  </header>

  <main style="padding-top: 40px;">
    <div style="text-align: center; margin-bottom: 50px;">
      <h1 style="font-family: 'Amatic SC', cursive; font-size: 5rem; color: var(--text-color);">Quick <span style="color: var(--btn-bg);">Reference</span></h1>
      <p style="color: var(--quote-color); font-size: 1.1rem;">Instant syntax guides powered by QuickRef.me</p>
    </div>

    <div id="quickref-container"></div>
  </main>

  <script src="../js/script.js"></script>
  
  <script>
    // 1. Your Organized Data
    const quickrefData = {
      "Quick Links": ["ChatGPT", "Bash", "Python", "JavaScript", "Go", "Vim", "RegEX", "Awk"],
      "Programming": ["InfrontJS", "EJS", "Swift", "Kotlin", "Express", "Kubernetes", "ES6", "MATLAB", "C", "INI", "LaTeX", "Rust", "C#", "Laravel", "Dart", "JSON", "HTML", "GraphQL", "C++", "Java", "PHP", "Docker", "TOML", "YAML", "CSS 3", "jQuery", "JavaScript", "Python", "Sass", "Go", "Markdown", "Bash"],
      "Toolkit": ["Homebrew", "Alan AI", "ChatGPT", "VSCode", "Mitmproxy", "XPath", "Emacs", "Emmet", "RegEX", "Vim"],
      "Linux Command": ["Taskset", "Pandoc", "Curl", "PM2", "Chmod", "Tmux", "Lsof", "SSH", "Netstat", "Screen", "Awk", "Find", "Sed", "Cron", "Git", "Grep", "Netcat"],
      "Python Tools": ["Numpy"],
      "Database": ["MongoDB", "Neo4j", "PostgreSQL", "Redis", "MySQL"],
      "Keyboard Shortcuts": ["Adobe Photoshop", "Apex Legends", "Figma", "Microsoft Teams", "TablePlus", "Bear", "Feedly", "FileZilla", "Reddit", "Slack", "SoundCloud", "Twitter", "Android Studio", "Github", "Shopify", "Zoom", "Adobe XD", "Firefox", "PhpStorm", "Postman", "Webflow", "1Password", "Adobe Lightroom CC", "Affinity Designer", "Pocket", "Trello", "Audacity", "Framer X", "Google Drive", "PuTTy", "Sequel Pro", "Apple Music", "Blender", "Obsidian", "Telegram Desktop", "YouTube", "Airtable", "Bitbucket", "Fortnite", "Gmail", "Sketch", "Spotify", "Brave Browser", "KanbanMail", "Microsoft Outlook", "Principle", "Skype", "Arduino IDE", "Asana", "Code Editor for iOS", "Jira", "Quip.com", "WordPress", "Chrome Dev Tools", "GIMP", "Google Chrome", "TickTick", "Todoist", "VLC Player", "Missive", "Origami Studio", "Sublime Text", "Transmit", "Affinity Photo", "Monday.com", "Proto.io", "Superhuman", "Vivaldi Browser", "Finder", "GitLab", "Guitar Pro", "Roam Research", "SketchUp Pro", "Unity 3D", "IntelliJ IDEA", "WebStorm"],
      "Other": ["PyTorch", "AI Directory", "Google Search", "ASCII Code", "Aspect Ratio", "HTML Characters Entities", "ISO 639-1 Language Code", "Resolutions", "HTTP Status Code", "Emoji", "QuickRef", "MIME types"]
    };

    // 2. Special URL Overrides
    // Some QuickRef URLs don't perfectly match their display names. 
    // We catch them here to ensure the links don't break!
    const urlOverrides = {
      "Telegram Desktop": "telegram",
      "CSS 3": "css",
      "C#": "c-sharp",
      "C++": "cpp",
      "Unity 3D": "unity"
    };

    const container = document.getElementById('quickref-container');

    // 3. Build the Grid
    for (const [category, items] of Object.entries(quickrefData)) {
      
      const section = document.createElement('div');
      section.className = 'outlined-box';
      section.style.marginBottom = '40px';
      section.style.padding = '30px';

      const title = document.createElement('h2');
      title.className = 'section-title';
      title.style.marginBottom = '20px';
      title.innerHTML = `<i class="fas fa-bookmark" style="color: var(--btn-bg);"></i> ${category}`;
      section.appendChild(title);

      const grid = document.createElement('div');
      grid.className = 'qr-grid';

      items.forEach((item) => {
        const link = document.createElement('a');
        link.className = 'qr-btn';
        link.textContent = item;
        link.target = "_blank"; 
        
        let urlSafeName;
        
        // Check if we have a special override for this specific tool
        if (urlOverrides[item]) {
          urlSafeName = urlOverrides[item];
        } else {
          // Standard conversion: lowercase and replace spaces with hyphens
          // Example: "Code Editor for iOS" -> "code-editor-for-ios"
          urlSafeName = item.toLowerCase().replace(/\s+/g, '-');
        }

        link.href = `https://quickref.me/${urlSafeName}`;
        grid.appendChild(link);
      });

      section.appendChild(grid);
      container.appendChild(section);
    }
  </script>
</body>
</html>
