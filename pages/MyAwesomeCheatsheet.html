<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Cheatsheet</title>
    <style>
        /* Base / Dark Theme Variables */
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --input-bg: #010409;
            --text-main: #c9d1d9;
            --text-accent: #58a6ff;
            --border-color: #30363d;
            --btn-primary: #238636;
            --btn-primary-hover: #2ea043;
            --btn-danger: #da3633;
            --tag-bg: rgba(31, 111, 235, 0.2);
            --tag-border: rgba(31, 111, 235, 0.4);
            --explain-bg: rgba(88, 166, 255, 0.05);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        }

        /* Light Theme Variables */
        :root[data-theme="light"] {
            --bg-color: #f6f8fa;
            --card-bg: #ffffff;
            --input-bg: #f6f8fa;
            --text-main: #24292f;
            --text-accent: #0969da;
            --border-color: #d0d7de;
            --btn-primary: #2da44e;
            --btn-primary-hover: #2c974b;
            --btn-danger: #cf222e;
            --tag-bg: rgba(9, 105, 218, 0.1);
            --tag-border: rgba(9, 105, 218, 0.2);
            --explain-bg: rgba(9, 105, 218, 0.05);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            scroll-behavior: smooth;
            transition: background-color 0.3s, color 0.3s;
        }

        .container { max-width: 1400px; margin: 0 auto; padding-right: 40px; }

        /* Header & Export */
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; flex-wrap: wrap; gap: 15px; }
        .header-bar h1 { margin: 0; color: var(--text-accent); }
        .export-btns { display: flex; gap: 10px; align-items: center; flex-wrap: wrap;}

        button { background-color: var(--btn-primary); color: white; border: 1px solid rgba(240,246,252,0.1); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { background-color: var(--btn-primary-hover); }
        button.danger { background-color: transparent; border-color: var(--btn-danger); color: var(--btn-danger); padding: 4px 8px; font-size: 12px;}
        button.danger:hover { background-color: var(--btn-danger); color: white; }
        button.edit { background-color: transparent; border-color: var(--text-accent); color: var(--text-accent); padding: 4px 8px; font-size: 12px;}
        button.edit:hover { background-color: var(--text-accent); color: var(--card-bg); }
        button.secondary { background-color: transparent; color: var(--text-main); border: 1px solid var(--border-color); }
        button.secondary:hover { background-color: var(--border-color); }

        /* Table of Contents */
        #toc-sidebar { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 100; }
        .toc-dot { width: 10px; height: 10px; background-color: var(--border-color); border-radius: 50%; cursor: pointer; position: relative; transition: background-color 0.2s, transform 0.2s; }
        .toc-dot:hover { background-color: var(--text-accent); transform: scale(1.3); }
        .toc-dot .toc-tooltip { visibility: hidden; background-color: var(--card-bg); color: var(--text-main); text-align: right; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border-color); position: absolute; right: 20px; top: 50%; transform: translateY(-50%); white-space: nowrap; font-size: 12px; opacity: 0; transition: opacity 0.2s; }
        .toc-dot:hover .toc-tooltip { visibility: visible; opacity: 1; }

        /* Masonry Grid Layout */
        .masonry-grid { column-count: 2; column-gap: 20px; margin-bottom: 50px; }
        @media (max-width: 1024px) { .masonry-grid { column-count: 1; } }

        /* Cheatsheet Cards */
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; margin-bottom: 20px; display: inline-block; width: 100%; box-sizing: border-box; position: relative; scroll-margin-top: 20px; transition: background-color 0.3s, border-color 0.3s; }
        
        .card-header-text { margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .card-header-text h1, .card-header-text h2, .card-header-text h3, .card-header-text h4, .card-header-text h5, .card-header-text h6 { margin: 0; }
        .card-header-text h1 { font-size: 1.6rem; }
        .card-header-text h2 { font-size: 1.4rem; }
        .card-header-text h3 { font-size: 1.2rem; }
        .card-header-text h4 { font-size: 1.1rem; }
        .card-header-text h5 { font-size: 1.0rem; }
        .card-header-text h6 { font-size: 0.9rem; color: #8b949e; }

        /* Snippet Container */
        .snippet-container { padding-bottom: 15px; margin-bottom: 15px; border-bottom: 1px dashed var(--border-color); position: relative; }
        .snippet-container:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0;}
        
        /* Snippet Top Bar (Tags & Actions) */
        .snippet-top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 10px; flex-wrap: wrap;}
        .snippet-actions { display: flex; gap: 5px; justify-content: flex-end; }
        .tags-container { display: flex; flex-wrap: wrap; gap: 5px; }
        .tag-pill { background-color: var(--tag-bg); color: var(--text-accent); border: 1px solid var(--tag-border); padding: 2px 6px; border-radius: 12px; font-size: 11px; font-weight: 600; }

        /* Side-by-Side Grid for Input/Output */
        .card-content-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .io-block { display: flex; flex-direction: column; height: 100%; }
        .code-container { position: relative; flex-grow: 1; display: flex; flex-direction: column; background-color: var(--input-bg); border-radius: 6px; border: 1px solid var(--border-color); transition: background-color 0.3s;}

        .copy-btn { position: absolute; top: 8px; right: 8px; background-color: var(--border-color); color: var(--text-main); border: none; padding: 4px 8px; font-size: 11px; border-radius: 4px; cursor: pointer; opacity: 0.6; transition: 0.2s; }
        .copy-btn:hover { opacity: 1; background-color: var(--text-accent); color: var(--card-bg); }

        .code-block { padding: 10px; padding-right: 50px; overflow-x: auto; flex-grow: 1; margin: 0; }
        .code-block pre { margin: 0; font-family: var(--font-mono); font-size: 13px; white-space: pre-wrap; word-break: break-all;}
        .block-label { font-size: 12px; color: #8b949e; margin-bottom: 6px; text-transform: uppercase; font-weight: bold;}

        /* Image styling */
        .output-image { max-width: 100%; height: auto; display: block; border-radius: 0 0 6px 6px; border-top: 1px dashed var(--border-color); object-fit: contain; }
        .output-image.only-image { border-top: none; border-radius: 6px; }

        /* Explanation Block */
        .explanation-block { margin-top: 15px; background-color: var(--explain-bg); padding: 12px 15px; border-left: 3px solid var(--text-accent); border-radius: 0 4px 4px 0; font-size: 14px; line-height: 1.5; }

        /* Input Area */
        .input-panel { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 30px; display: flex; flex-direction: column; gap: 15px; }
        .input-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .input-group > div { flex: 1; min-width: 250px; display: flex; flex-direction: column; gap: 5px; }

        label { font-weight: 600; font-size: 14px; color: var(--text-accent); display: flex; justify-content: space-between; align-items: center;}
        
        .pin-checkbox { font-size: 12px; font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 4px; color: var(--text-main);}
        
        input[type="text"], textarea, input[type="file"] { background-color: var(--input-bg); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px; border-radius: 6px; font-family: var(--font-mono); font-size: 14px; resize: vertical; }
        textarea { min-height: 100px; }
        input[type="text"]:focus, textarea:focus, input[type="file"]:focus { outline: none; border-color: var(--text-accent); }
        
        .file-upload-wrapper { display: flex; align-items: center; gap: 10px; }
        #imagePreview { max-width: 50px; max-height: 50px; display: none; border-radius: 4px; border: 1px solid var(--border-color); }

        /* PRINT / PDF EXPORT STYLES */
        @media print {
            body, html { background-color: #ffffff !important; color: #000000 !important; }
            .container { padding-right: 0; max-width: 100%; }
            #toc-sidebar, .input-panel, .export-btns, .snippet-actions, .copy-btn { display: none !important; }
            .header-bar { border-bottom: 2px solid #000; margin-bottom: 20px; }
            .header-bar h1 { color: #000 !important; }
            .masonry-grid { column-count: 2; column-gap: 20px; }
            .card { background-color: #fff !important; border: 1px solid #ccc !important; break-inside: avoid; page-break-inside: avoid; margin-bottom: 15px; box-shadow: none !important; }
            .code-container { background-color: #f9f9f9 !important; border: 1px solid #ddd !important; }
            .explanation-block { background-color: #f0f8ff !important; border-left-color: #0969da !important; color: #000 !important; }
            .tag-pill { background-color: #eee !important; color: #333 !important; border-color: #ccc !important; }
            .card-header-text h1, .card-header-text h2, .card-header-text h3 { color: #000 !important; }
            .card-content-grid { display: flex; flex-direction: row; flex-wrap: wrap; }
            .io-block { flex: 1; min-width: 200px; }
        }
    </style>
</head>
<body>

<div id="toc-sidebar"></div>

<div class="container">
    <div class="header-bar">
        <h1 id="page-title">Cheatsheet Generator</h1>
        <div class="export-btns">
            <button onclick="toggleTheme()" class="secondary">🌓 Theme</button>
            <button onclick="window.print()" class="secondary">🖨️ Print / PDF</button>
            <button onclick="exportToMarkdown()">Export .MD</button>
            <button onclick="exportToHTML()">Export .HTML</button>
        </div>
    </div>

    <div class="masonry-grid" id="cheatsheetContainer"></div>

    <div class="input-panel">
        <div class="input-group">
            <div>
                <label>
                    Header (e.g. ## Topic)
                    <label class="pin-checkbox"><input type="checkbox" id="pinHeader"> 📌 Pin Header</label>
                </label>
                <input type="text" id="headerInput" list="existingHeaders" autocomplete="off" placeholder="## Title...">
                <datalist id="existingHeaders"></datalist>
            </div>
            <div>
                <label>Snippet Tags (Comma separated)</label>
                <input type="text" id="tagInput" placeholder="e.g. bash, docker, networking">
            </div>
        </div>
        
        <div class="input-group">
            <div>
                <label>Input (Code / Command)</label>
                <textarea id="codeInput" placeholder="Type your code here..."></textarea>
            </div>
            <div>
                <label>Output (Text Result)</label>
                <textarea id="outputInput" placeholder="Type the expected text output here..."></textarea>
            </div>
        </div>

        <div class="input-group">
            <div style="flex: 1;">
                <label>Output Image / Visualization</label>
                <div class="file-upload-wrapper">
                    <input type="file" id="imageFileInput" accept="image/*">
                    <img id="imagePreview" src="" alt="Preview">
                    <button class="danger" id="clearImageBtn" style="display:none;" onclick="clearImageUpload()">Clear</button>
                </div>
            </div>
            <div style="flex: 2;">
                <label>Explanation / Notes</label>
                <textarea id="explanationInput" style="min-height: 60px;" placeholder="Explain what this code does..."></textarea>
            </div>
        </div>
        
        <input type="hidden" id="editId">
        <button onclick="addOrUpdateEntry()" id="submitBtn">Add to Cheatsheet</button>
    </div>
</div>

<script>
    let globalTitle = "My Cheatsheet";
    let cheatsheets = [];
    let currentAttachedImageBase64 = null;

    window.onload = function() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        setTimeout(() => {
            let userTitle = prompt("Enter a title for your cheatsheet file:", "My Awesome Cheatsheet");
            if (userTitle) {
                globalTitle = userTitle.trim();
                document.getElementById('page-title').innerText = globalTitle;
                document.title = globalTitle;
            }
        }, 100);
    };

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const target = current === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', target);
        localStorage.setItem('theme', target);
    }

    document.getElementById('imageFileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                currentAttachedImageBase64 = event.target.result;
                document.getElementById('imagePreview').src = currentAttachedImageBase64;
                document.getElementById('imagePreview').style.display = 'block';
                document.getElementById('clearImageBtn').style.display = 'inline-block';
            };
            reader.readAsDataURL(file);
        }
    });

    function clearImageUpload() {
        currentAttachedImageBase64 = null;
        document.getElementById('imageFileInput').value = '';
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('imagePreview').src = '';
        document.getElementById('clearImageBtn').style.display = 'none';
    }

    function parseMarkdown(text) {
        if (!text) return '';
        let html = text;
        html = html.replace(/^###### (.*$)/gim, '<h6>$1</h6>');
        html = html.replace(/^##### (.*$)/gim, '<h5>$1</h5>');
        html = html.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
        html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
        html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
        html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
        html = html.replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>');
        html = html.replace(/\*(.*?)\*/gim, '<em>$1</em>');
        if (!html.match(/^<h[1-6]>/)) { html = `<h3>${html}</h3>`; }
        return html;
    }

    function cleanHeaderText(text) {
        return text.replace(/#/g, '').replace(/\*/g, '').trim();
    }

    // Populate Datalist with unique headers
    function updateHeaderOptions() {
        const datalist = document.getElementById('existingHeaders');
        datalist.innerHTML = '';
        const uniqueHeaders = [...new Set(cheatsheets.map(item => item.header))].filter(Boolean);
        
        uniqueHeaders.forEach(header => {
            const option = document.createElement('option');
            option.value = header;
            datalist.appendChild(option);
        });
    }

    function addOrUpdateEntry() {
        const header = document.getElementById('headerInput').value.trim();
        const tags = document.getElementById('tagInput').value.trim();
        const code = document.getElementById('codeInput').value.trim();
        const output = document.getElementById('outputInput').value.trim();
        const explanation = document.getElementById('explanationInput').value.trim();
        const editId = document.getElementById('editId').value;

        if (!header && !code && !output && !explanation && !currentAttachedImageBase64) {
            return alert("Please enter some content.");
        }

        const entry = {
            id: editId ? editId : 'item-' + Date.now().toString(),
            header: header || 'Untitled Section',
            tags: tags,
            code: code,
            output: output,
            image: currentAttachedImageBase64,
            explanation: explanation
        };

        if (editId) {
            const index = cheatsheets.findIndex(item => item.id === editId);
            cheatsheets[index] = entry;
            document.getElementById('submitBtn').innerText = "Add to Cheatsheet";
        } else {
            cheatsheets.push(entry);
        }

        clearInputs();
        updateHeaderOptions();
        renderCheatsheets();
    }

    function editEntry(id) {
        const entry = cheatsheets.find(item => item.id === id);
        if (entry) {
            document.getElementById('headerInput').value = entry.header === 'Untitled Section' ? '' : entry.header;
            document.getElementById('tagInput').value = entry.tags || '';
            document.getElementById('codeInput').value = entry.code;
            document.getElementById('outputInput').value = entry.output;
            document.getElementById('explanationInput').value = entry.explanation || '';
            
            if (entry.image) {
                currentAttachedImageBase64 = entry.image;
                document.getElementById('imagePreview').src = currentAttachedImageBase64;
                document.getElementById('imagePreview').style.display = 'block';
                document.getElementById('clearImageBtn').style.display = 'inline-block';
            } else {
                clearImageUpload();
            }

            document.getElementById('editId').value = entry.id;
            document.getElementById('submitBtn').innerText = "Update Cheatsheet";
            document.querySelector('.input-panel').scrollIntoView({ behavior: 'smooth' });
        }
    }

    function deleteEntry(id) {
        if(confirm("Are you sure you want to delete this snippet?")) {
            cheatsheets = cheatsheets.filter(item => item.id !== id);
            updateHeaderOptions();
            renderCheatsheets();
        }
    }

    // Core Generation Engine
    function generateCheatsheetCardsHTML(isExport = false) {
        const groupOrder = [];
        const groups = {};

        // Group purely by Header string. Tags are NO LONGER aggregated here.
        cheatsheets.forEach(item => {
            const h = item.header;
            if (!groups[h]) {
                groups[h] = { id: 'group-' + Math.random().toString(36).substr(2, 9), items: [] };
                groupOrder.push(h);
            }
            groups[h].items.push(item);
        });

        let finalHTML = '';
        let tocData = [];

        groupOrder.forEach(headerText => {
            const group = groups[headerText];

            let cardHTML = `<div class="card" id="${group.id}">
                <div class="card-header-text">${parseMarkdown(headerText)}</div>
            `;

            tocData.push({ id: group.id, title: cleanHeaderText(headerText) });

            group.items.forEach(item => {
                cardHTML += `<div class="snippet-container">`;
                
                // Process Snippet Tags
                let snippetTagsHTML = '';
                if (item.tags) {
                    const tagArray = item.tags.split(',').map(t => t.trim()).filter(Boolean);
                    if (tagArray.length > 0) {
                        snippetTagsHTML = `<div class="tags-container">` + 
                            tagArray.map(tag => `<span class="tag-pill">${escapeHTML(tag)}</span>`).join('') + 
                        `</div>`;
                    }
                }

                // Render Snippet Top Bar (Tags on left, Actions on right)
                cardHTML += `<div class="snippet-top-bar">`;
                cardHTML += snippetTagsHTML; 
                
                if (!isExport) {
                    cardHTML += `
                        <div class="snippet-actions">
                            <button class="edit" onclick="editEntry('${item.id}')">Edit</button>
                            <button class="danger" onclick="deleteEntry('${item.id}')">Delete</button>
                        </div>
                    `;
                }
                cardHTML += `</div>`;

                // Content Grid
                cardHTML += `<div class="card-content-grid">`;

                if (item.code) {
                    cardHTML += `
                        <div class="io-block">
                            <div class="block-label">Input / Code</div>
                            <div class="code-container">
                                <button class="copy-btn" onclick="copyTextToClipboard(this, \`${escapeHTML(item.code).replace(/`/g, '\\`')}\`)">Copy</button>
                                <div class="code-block"><pre>${escapeHTML(item.code)}</pre></div>
                            </div>
                        </div>
                    `;
                }

                if (item.output || item.image) {
                    cardHTML += `<div class="io-block"><div class="block-label">Output</div><div class="code-container">`;
                    if (item.output) {
                        cardHTML += `
                            <button class="copy-btn" onclick="copyTextToClipboard(this, \`${escapeHTML(item.output).replace(/`/g, '\\`')}\`)">Copy</button>
                            <div class="code-block"><pre>${escapeHTML(item.output)}</pre></div>
                        `;
                    }
                    if (item.image) {
                        const imgClass = item.output ? "output-image" : "output-image only-image";
                        cardHTML += `<img src="${item.image}" class="${imgClass}" alt="Visualization">`;
                    }
                    cardHTML += `</div></div>`;
                }
                cardHTML += `</div>`; 

                if (item.explanation) {
                    cardHTML += `<div class="explanation-block">${parseMarkdown(item.explanation)}</div>`;
                }

                cardHTML += `</div>`; 
            });

            cardHTML += `</div>`;
            finalHTML += cardHTML;
        });

        return { html: finalHTML, toc: tocData };
    }

    function renderCheatsheets() {
        const container = document.getElementById('cheatsheetContainer');
        const tocSidebar = document.getElementById('toc-sidebar');
        
        const generated = generateCheatsheetCardsHTML(false);
        container.innerHTML = generated.html;

        tocSidebar.innerHTML = '';
        generated.toc.forEach(dotData => {
            const dot = document.createElement('a');
            dot.href = `#${dotData.id}`;
            dot.className = 'toc-dot';
            dot.innerHTML = `<span class="toc-tooltip">${escapeHTML(dotData.title)}</span>`;
            tocSidebar.appendChild(dot);
        });
    }

    window.copyTextToClipboard = function(btnElement, text) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btnElement.innerText;
            btnElement.innerText = "Copied!";
            btnElement.style.backgroundColor = "var(--btn-primary)";
            btnElement.style.color = "white";
            setTimeout(() => {
                btnElement.innerText = originalText;
                btnElement.style.backgroundColor = "";
                btnElement.style.color = "";
            }, 2000);
        });
    }

    function clearInputs() {
        // Obey the Pin checkbox logic
        if (!document.getElementById('pinHeader').checked) {
            document.getElementById('headerInput').value = '';
        }
        
        document.getElementById('tagInput').value = '';
        document.getElementById('codeInput').value = '';
        document.getElementById('outputInput').value = '';
        document.getElementById('explanationInput').value = '';
        document.getElementById('editId').value = '';
        clearImageUpload();
    }

    function getExportFilename(extension) {
        const safeName = globalTitle.replace(/[^a-z0-9]/gi, '_').toLowerCase();
        return `${safeName}.${extension}`;
    }

    function exportToMarkdown() {
        if (cheatsheets.length === 0) return alert("Nothing to export!");
        let mdContent = `# ${globalTitle}\n\n`;

        cheatsheets.forEach(item => {
            mdContent += `${item.header}\n`;
            if (item.tags) mdContent += `*Tags: ${item.tags}*\n\n`;
            if (item.code) mdContent += `**Input:**\n\`\`\`\n${item.code}\n\`\`\`\n\n`;
            if (item.output) mdContent += `**Output:**\n\`\`\`\n${item.output}\n\`\`\`\n\n`;
            if (item.image) mdContent += `> *[Visualization image attached - View in HTML export]*\n\n`;
            if (item.explanation) mdContent += `> **Explanation:** ${item.explanation}\n\n`;
            mdContent += `---\n\n`;
        });

        triggerDownload(mdContent, "text/markdown", getExportFilename("md"));
    }

    function exportToHTML() {
        if (cheatsheets.length === 0) return alert("Nothing to export!");
        const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
        const generatedContent = generateCheatsheetCardsHTML(true);
        const styleContent = document.querySelector('style').innerHTML;

        let htmlContent = `<!DOCTYPE html>
<html lang="en" data-theme="${currentTheme}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${escapeHTML(globalTitle)}</title>
    <style>${styleContent}</style>
</head>
<body>
    <div class="container" style="max-width: 1200px; padding: 40px 20px;">
        <div class="header-bar">
            <h1>${escapeHTML(globalTitle)}</h1>

        window.onload = function() {
            const savedTheme = localStorage.getItem('exported_cheatsheet_theme') || '${currentTheme}';
            document.documentElement.setAttribute('data-theme', savedTheme);
        };
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('exported_cheatsheet_theme', target);
        }
        function copyTextToClipboard(btnElement, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btnElement.innerText;
                btnElement.innerText = "Copied!";
                btnElement.style.backgroundColor = "var(--btn-primary)";
                btnElement.style.color = "white";
                setTimeout(() => {
                    btnElement.innerText = originalText;

    function triggerDownload(content, type, filename) {
        const blob = new Blob([content], { type: type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag)
        );
    }
</script>
