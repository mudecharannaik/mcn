<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Cheatsheet</title>

    <!-- html2pdf for reliable PDF export (kept for exported HTML) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"
        integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
        </script>

    <style>
        /* ===== MODERN THEME VARIABLES ===== */
        :root {
            /* Dark Mode (Default) */
            --bg-color: #090c10;
            --card-bg: #161b22;
            --input-bg: #010409;
            --text-main: #c9d1d9;
            --text-secondary: #8b949e;
            --text-accent: #58a6ff;
            --border-color: #30363d;
            --border-highlight: #58a6ff;
            --btn-primary: #238636;
            --btn-primary-hover: #2ea043;
            --btn-danger: #da3633;
            --tag-bg: rgba(88, 166, 255, 0.15);
            --tag-border: rgba(88, 166, 255, 0.3);
            --explain-bg: rgba(88, 166, 255, 0.05);

            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;

            --code-bg: #010409;
            --code-text: #c9d1d9;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 0 3px rgba(88, 166, 255, 0.3);
            --radius: 10px;
            --radius-sm: 6px;
        }

        :root[data-theme="light"] {
            /* Light Mode */
            --bg-color: #f6f8fa;
            --card-bg: #ffffff;
            --input-bg: #ffffff;
            --text-main: #24292f;
            --text-secondary: #57606a;
            --text-accent: #0969da;
            --border-color: #d0d7de;
            --border-highlight: #0969da;
            --btn-primary: #2da44e;
            --btn-primary-hover: #2c974b;
            --btn-danger: #cf222e;
            --tag-bg: rgba(9, 105, 218, 0.1);
            --tag-border: rgba(9, 105, 218, 0.2);
            --explain-bg: rgba(9, 105, 218, 0.03);

            --code-bg: #f6f8fa;
            --code-text: #24292f;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.15);
            --shadow-glow: 0 0 0 3px rgba(9, 105, 218, 0.3);
        }

        /* ===== GLOBAL ===== */
        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 90px 40px 100px 40px;
        }

        /* ===== STICKY HEADER ===== */
        .sticky-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: color-mix(in srgb, var(--bg-color) 85%, transparent);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            z-index: 900;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .sticky-header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--text-accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .export-btns {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* ===== BUTTONS ===== */
        button,
        .btn-style {
            background-color: var(--btn-primary);
            color: white;
            border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            font-family: inherit;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button:hover,
        .btn-style:hover {
            background-color: var(--btn-primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary,
        .btn-style.secondary {
            background-color: transparent;
            color: var(--text-main);
            border-color: var(--border-color);
        }

        button.secondary:hover,
        .btn-style.secondary:hover {
            background-color: var(--card-bg);
            border-color: var(--text-secondary);
        }

        button.danger {
            background-color: transparent;
            border-color: transparent;
            color: var(--btn-danger);
            padding: 4px 8px;
            font-size: 0.8rem;
        }

        button.danger:hover {
            background-color: rgba(218, 54, 51, 0.1);
        }

        button.edit {
            background-color: transparent;
            border-color: transparent;
            color: var(--text-accent);
            padding: 4px 8px;
            font-size: 0.8rem;
        }

        button.edit:hover {
            background-color: var(--tag-bg);
        }

        .hidden-file-input {
            display: none;
        }

        /* ===== IPYNB / MD CONVERTER SECTION ===== */
        .converter-toggle-wrapper {
            margin-bottom: 20px;
            display: flex;
            justify-content: flex-end;
        }

        #ipynbConverterSection {
            display: none;
            margin-bottom: 30px;
            animation: slideDown 0.3s ease;
        }

        #ipynbConverterSection.open {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ipynb-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: 0.3s;
        }

        .upload-zone {
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            border: 2px dashed var(--border-color);
            margin: 15px;
            border-radius: var(--radius);
            background: var(--input-bg);
        }

        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: var(--text-accent);
            background: var(--tag-bg);
        }

        .upload-zone .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .upload-zone h3 {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .upload-zone p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin: 0;
        }

        .ipynb-status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: var(--input-bg);
            border-top: 1px solid var(--border-color);
        }

        .ipynb-status-bar .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border-color);
        }

        .ipynb-status-bar .dot.success {
            background: var(--btn-primary);
        }

        .ipynb-status-bar .dot.error {
            background: var(--btn-danger);
        }

        .results-wrapper {
            display: none;
        }

        .results-wrapper.active {
            display: block;
        }

        .ipynb-actions {
            padding: 15px 20px;
            background: var(--card-bg);
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border-color);
        }

        /* ===== INPUT PANEL ===== */
        .input-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 25px;
            margin-top: 35px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .input-group>div {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        textarea,
        input[type="file"] {
            background-color: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            transition: all 0.2s;
            width: 100%;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--border-highlight);
            box-shadow: var(--shadow-glow);
        }

        /* --- PIN & HEADER UX --- */
        .header-input-wrapper {
            display: flex;
            gap: 10px;
        }

        .pin-btn {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 1.2rem;
            padding: 0 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pin-btn:hover {
            background: var(--card-bg);
            border-color: var(--text-main);
        }

        .pin-btn.active {
            background: var(--tag-bg);
            border-color: var(--border-highlight);
            color: var(--text-accent);
            box-shadow: 0 0 10px var(--tag-bg);
        }

        input[list] {
            cursor: pointer;
        }

        .submit-btn {
            background-color: var(--text-accent);
            color: var(--bg-color);
            padding: 14px;
            font-size: 1rem;
            border-radius: var(--radius-sm);
            margin-top: 10px;
            border: none;
        }

        .submit-btn:hover {
            background-color: var(--border-highlight);
            filter: brightness(1.1);
        }

        /* ===== MASONRY GRID ===== */
        .masonry-grid {
            column-count: 2;
            column-gap: 25px;
        }

        @media (max-width: 1024px) {
            .masonry-grid {
                column-count: 1;
            }
        }

        /* ===== CHEATSHEET CARDS ===== */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 25px;
            display: inline-block;
            width: 100%;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            border-color: var(--text-secondary);
            box-shadow: var(--shadow-md);
        }

        .card-header-text {
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .card-header-text h1,
        .card-header-text h2,
        .card-header-text h3 {
            margin: 0;
            color: var(--text-main);
        }

        .card-header-text h1 {
            font-size: 1.5rem;
        }

        .card-header-text h2 {
            font-size: 1.3rem;
        }

        .snippet-container {
            padding-bottom: 20px;
            margin-bottom: 20px;
            border-bottom: 1px dashed var(--border-color);
        }

        .snippet-container:last-child {
            border-bottom: none;
            padding-bottom: 0;
            margin-bottom: 0;
        }

        .snippet-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag-pill {
            background-color: var(--tag-bg);
            color: var(--text-accent);
            border: 1px solid var(--tag-border);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .card-content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .io-block {
            display: flex;
            flex-direction: column;
        }

        .block-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .code-container {
            position: relative;
            flex-grow: 1;
            background-color: var(--input-bg);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: var(--border-color);
            color: var(--text-main);
            border: none;
            padding: 4px 8px;
            font-size: 0.7rem;
            border-radius: 4px;
            opacity: 0;
            transition: 0.2s;
            z-index: 5;
        }

        .code-container:hover .copy-btn {
            opacity: 1;
        }

        .copy-btn:hover {
            background-color: var(--text-accent);
            color: var(--bg-color);
        }

        .code-block {
            padding: 12px;
            padding-right: 50px;
            overflow-x: auto;
            margin: 0;
        }

        .code-block pre {
            margin: 0;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: var(--text-main);
        }

        .explanation-block {
            margin-top: 15px;
            background-color: var(--explain-bg);
            padding: 12px 16px;
            border-left: 4px solid var(--border-highlight);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-size: 0.9rem;
        }

        .output-image {
            max-width: 100%;
            height: auto;
            display: block;
            border-top: 1px solid var(--border-color);
        }

        .output-image.only-image {
            border-top: none;
            border-radius: 6px;
        }

        /* ===== SLIDING TOC SIDEBAR ===== */
        #toc-sidebar {
            position: fixed;
            right: -320px;
            top: 0;
            width: 300px;
            height: 100vh;
            background: var(--card-bg);
            border-left: 1px solid var(--border-color);
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.3);
            z-index: 2000;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        #toc-sidebar.open {
            right: 0;
        }

        .toc-header {
            padding: 20px;
            font-weight: 700;
            color: var(--text-accent);
            text-transform: uppercase;
            font-size: 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toc-header button {
            margin: 0;
        }

        #toc-list {
            list-style: none;
            padding: 15px 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            flex-grow: 1;
        }

        #toc-list a {
            display: block;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            transition: 0.2s;
            border-left: 2px solid transparent;
        }

        #toc-list a:hover {
            background: var(--explain-bg);
            color: var(--text-accent);
            border-left-color: var(--border-highlight);
        }

        /* Floating Toggle Button */
        #toc-toggle-main {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: var(--text-accent);
            color: var(--bg-color);
            border: none;
            box-shadow: var(--shadow-lg);
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2001;
            transition: 0.2s;
        }

        #toc-toggle-main:hover {
            transform: scale(1.1);
            filter: brightness(1.1);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translate(-50%, 20px);
            background: var(--text-main);
            color: var(--bg-color);
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
            z-index: 9999;
            box-shadow: var(--shadow-md);
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        /* ===== PDF GENERATION OVERLAY (kept for exported HTML) ===== */
        .pdf-generating #toc-sidebar,
        .pdf-generating #toc-toggle-main,
        .pdf-generating .input-panel,
        .pdf-generating .export-btns,
        .pdf-generating .copy-btn,
        .pdf-generating .snippet-actions,
        .pdf-generating .converter-toggle-wrapper,
        .pdf-generating #ipynbConverterSection {
            display: none !important;
        }

        .pdf-generating .container {
            padding: 20px 30px !important;
            max-width: 100% !important;
            width: 100% !important;
            margin: 0 !important;
        }

        .pdf-generating .sticky-header {
            position: relative !important;
            background: var(--bg-color) !important;
            backdrop-filter: none !important;
            box-shadow: none !important;
            border-bottom: 1px solid var(--border-color) !important;
            padding: 15px 30px !important;
        }

        .pdf-generating .masonry-grid {
            column-count: 1 !important;
        }

        .pdf-generating .card {
            break-inside: avoid !important;
            page-break-inside: avoid !important;
        }

        .pdf-generating .snippet-container {
            break-inside: avoid !important;
            page-break-inside: avoid !important;
        }

        .pdf-generating .io-block {
            break-inside: avoid !important;
            page-break-inside: avoid !important;
        }

        /* ===== PRINT STYLES ===== */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .sticky-header,
            #toc-sidebar,
            #toc-toggle-main,
            .input-panel,
            .copy-btn,
            .snippet-actions,
            .converter-toggle-wrapper,
            #ipynbConverterSection {
                display: none !important;
            }

            body {
                background: white !important;
                color: black !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            .container {
                padding: 20px 30px !important;
                max-width: 100% !important;
                width: 100% !important;
                margin: 0 !important;
            }

            .masonry-grid {
                column-count: 1 !important;
                display: block !important;
                width: 100% !important;
            }

            .card {
                break-inside: avoid !important;
                page-break-inside: avoid !important;
                border: 1px solid #ccc !important;
                box-shadow: none !important;
                margin-bottom: 25px !important;
                background: white !important;
                color: black !important;
                padding: 15px !important;
                display: block !important;
                width: 100% !important;
            }

            .snippet-container {
                break-inside: avoid !important;
                page-break-inside: avoid !important;
                padding-bottom: 15px !important;
                margin-bottom: 15px !important;
                border-bottom: 1px dashed #ccc !important;
            }

            .snippet-container:last-child {
                border-bottom: none !important;
            }

            .card-content-grid {
                display: block !important;
                width: 100% !important;
            }

            .io-block {
                break-inside: avoid !important;
                page-break-inside: avoid !important;
                margin-bottom: 15px !important;
                width: 100% !important;
            }

            .code-container {
                background: #f5f5f5 !important;
                border: 1px solid #ddd !important;
                color: #333 !important;
                overflow: visible !important;
            }

            .code-block pre {
                color: #333 !important;
                white-space: pre-wrap !important;
                word-wrap: break-word !important;
                font-size: 0.75rem !important;
            }

            .explanation-block {
                background: #f9f9f9 !important;
                border-left-color: #0969da !important;
                color: #333 !important;
            }

            .tag-pill {
                background: #eef2ff !important;
                color: #0969da !important;
                border-color: #c5d0ff !important;
            }

            .block-label {
                color: #666 !important;
            }

            .card-header-text {
                border-bottom-color: #ccc !important;
            }

            .card-header-text h1,
            .card-header-text h2,
            .card-header-text h3 {
                color: #000 !important;
            }

            .output-image {
                border-top-color: #ddd !important;
            }

            /* Ensure long code blocks can flow naturally */
            .code-block {
                overflow: visible !important;
                max-height: none !important;
            }
        }
    </style>
</head>

<body>

    <!-- STICKY TOP HEADER -->
    <div class="sticky-header">
        <h1 id="page-title">📚 My Cheatsheet</h1>
        <div class="export-btns">
            <button onclick="toggleTheme()" class="secondary" title="Toggle Theme">🌓</button>
            <span style="color: var(--border-color);">|</span>
            <button onclick="exportStateJSON()" class="secondary" title="Save Backup">💾 Save</button>
            <label class="btn-style secondary" title="Load Backup">
                📂 Load <input type="file" id="importJsonFile" accept=".json" class="hidden-file-input"
                    onchange="importStateJSON(event)">
            </label>
            <button onclick="resetWorkspace()" class="danger" title="Clear all data and start fresh">🗑️ Reset</button>
            <span style="color: var(--border-color);">|</span>
            <button onclick="exportToMarkdown()" title="Export as Markdown">📄 .MD</button>
            <button onclick="exportToHTML()" title="Export as offline HTML">🌐 .HTML</button>
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="container" id="main-container">

        <!-- TOGGLE IMPORTER -->
        <div class="converter-toggle-wrapper">
            <button onclick="document.getElementById('ipynbConverterSection').classList.toggle('open')"
                class="secondary">
                📓 Import File (.ipynb / .md)
            </button>
        </div>

        <!-- IPYNB / MD CONVERTER SECTION -->
        <div id="ipynbConverterSection">
            <div class="ipynb-card">
                <div class="upload-zone" id="uploadZone" title="Click to browse or drag & drop">
                    <span class="upload-icon">⬇️</span>
                    <h3>Drop your <code>.ipynb</code> or <code>.md</code> file here</h3>
                    <p>or click to browse — then <strong>import</strong> into your cheatsheet</p>
                    <input type="file" id="fileInput" accept=".ipynb,.md,.markdown" class="hidden-file-input">
                </div>

                <div class="results-wrapper" id="ipynbResultsSection">
                    <div class="ipynb-status-bar" id="ipynbStatusBar">
                        <span class="dot" id="ipynbStatusDot"></span>
                        <strong id="ipynbStatusFileName" style="flex-grow:1;">—</strong>
                        <span style="font-size:12px; color:var(--text-secondary);" id="ipynbStatItems">0 items</span>
                    </div>
                    <div class="ipynb-actions">
                        <button id="btnImportToCheatsheet">📥 Import to Cheatsheet</button>
                        <button class="secondary" id="ipynbBtnClear">🔄 Clear</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- MASONRY GRID -->
        <div class="masonry-grid" id="cheatsheetContainer"></div>

        <!-- INPUT PANEL -->
        <div class="input-panel">
            <div class="input-group">
                <div style="flex: 1.5;">
                    <label>Category Header</label>
                    <div class="header-input-wrapper">
                        <input type="text" id="headerInput" list="existingHeaders" autocomplete="off"
                            placeholder="e.g. ## Docker Commands" onclick="try{this.showPicker();}catch(e){}">
                        <datalist id="existingHeaders"></datalist>
                        <button type="button" id="pinBtn" class="pin-btn" onclick="togglePin()"
                            title="Pin this header to rapidly add multiple snippets">📌</button>
                    </div>
                </div>
                <div style="flex: 1;">
                    <label>Snippet Tags</label>
                    <input type="text" id="tagInput" placeholder="e.g. bash, network">
                </div>
            </div>

            <div class="input-group">
                <div>
                    <label>Input Code / Command</label>
                    <textarea id="codeInput" placeholder="Enter your code snippet here..."></textarea>
                </div>
                <div>
                    <label>Expected Output</label>
                    <textarea id="outputInput" placeholder="Enter the expected output..."></textarea>
                </div>
            </div>

            <div class="input-group">
                <div style="flex: 1;">
                    <label>Attach Image (Optional)</label>
                    <div style="display: flex; gap: 10px; align-items: center; margin-top: 5px;">
                        <input type="file" id="imageFileInput" accept="image/*">
                        <img id="imagePreview" src="" alt="Preview"
                            style="display:none; width:40px; height:40px; border-radius:4px; object-fit:cover;">
                        <button class="danger" id="clearImageBtn" style="display:none;"
                            onclick="clearImageUpload()">✕</button>
                    </div>
                </div>
                <div style="flex: 2;">
                    <label>Explanation / Notes</label>
                    <textarea id="explanationInput" style="min-height: 60px;"
                        placeholder="Add any context or notes..."></textarea>
                </div>
            </div>

            <input type="hidden" id="editId">
            <button onclick="addOrUpdateEntry()" id="submitBtn" class="submit-btn">✨ Add Snippet Below</button>
        </div>

    </div>

    <!-- FULL HEIGHT SLIDING TOC SIDEBAR -->
    <div id="toc-sidebar">
        <div class="toc-header">
            <span>📑 Contents</span>
            <button id="toc-close-btn" class="danger">✕</button>
        </div>
        <ul id="toc-list"></ul>
    </div>

    <!-- FLOATING TOC TOGGLE BUTTON -->
    <button id="toc-toggle-main" title="Toggle Table of Contents">📑</button>

    <!-- TOAST NOTIFICATION -->
    <div class="toast" id="toast"></div>

    <script>
        // ==========================================
        //  STATE & INITIALIZATION
        // ==========================================
        let globalTitle = "My Cheatsheet";
        let cheatsheets = [];
        let currentAttachedImageBase64 = null;
        let isHeaderPinned = false;

        window.onload = function () {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);

            let savedTitle = localStorage.getItem('cheatsheet_title');
            if (savedTitle) {
                globalTitle = savedTitle;
            } else {
                let userTitle = prompt("Welcome! Give your new cheatsheet a title:", "My Awesome Cheatsheet");
                if (userTitle) {
                    globalTitle = userTitle.trim();
                    localStorage.setItem('cheatsheet_title', globalTitle);
                }
            }
            document.getElementById('page-title').innerHTML = `📚 ${globalTitle}`;
            document.title = globalTitle;

            loadLocalState();
            initTOC();
        };

        function saveLocalState() {
            localStorage.setItem('my_cheatsheet_data', JSON.stringify(cheatsheets));
            localStorage.setItem('cheatsheet_title', globalTitle);
        }

        function loadLocalState() {
            const data = localStorage.getItem('my_cheatsheet_data');
            if (data) {
                try {
                    cheatsheets = JSON.parse(data);
                    updateHeaderOptions();
                    renderCheatsheets();
                } catch (e) { console.error("Failed to parse local save data."); }
            }
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            clearTimeout(toast._timer);
            toast.textContent = msg;
            toast.classList.add('show');
            toast._timer = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ==========================================
        //  UI UX: PIN, DROPDOWN & TOC LOGIC
        // ==========================================
        function togglePin() {
            isHeaderPinned = !isHeaderPinned;
            const btn = document.getElementById('pinBtn');
            if (isHeaderPinned) {
                btn.classList.add('active');
                showToast("📌 Header Pinned!");
            } else {
                btn.classList.remove('active');
                showToast("📌 Header Unpinned.");
            }
        }

        function updateHeaderOptions() {
            const datalist = document.getElementById('existingHeaders');
            datalist.innerHTML = '';
            const uniqueHeaders = [...new Set(cheatsheets.map(item => item.header))].filter(Boolean);
            uniqueHeaders.forEach(header => {
                const option = document.createElement('option');
                option.value = header;
                datalist.appendChild(option);
            });
        }

        function initTOC() {
            const sidebar = document.getElementById('toc-sidebar');
            const mainToggle = document.getElementById('toc-toggle-main');
            const closeBtn = document.getElementById('toc-close-btn');

            function toggleTOC() { sidebar.classList.toggle('open'); }
            mainToggle.addEventListener('click', toggleTOC);
            closeBtn.addEventListener('click', toggleTOC);
        }

        // ==========================================
        //  CRUD OPERATIONS
        // ==========================================
        function addOrUpdateEntry() {
            const header = document.getElementById('headerInput').value.trim();
            const tags = document.getElementById('tagInput').value.trim();
            const code = document.getElementById('codeInput').value.trim();
            const output = document.getElementById('outputInput').value.trim();
            const explanation = document.getElementById('explanationInput').value.trim();
            const editId = document.getElementById('editId').value;

            if (!header && !code && !output && !explanation && !currentAttachedImageBase64) {
                return showToast("⚠️ Please enter some content.");
            }

            const entry = {
                id: editId ? editId : 'item-' + Date.now().toString(),
                header: header || 'General',
                tags: tags,
                code: code,
                output: output,
                image: currentAttachedImageBase64,
                explanation: explanation
            };

            if (editId) {
                const index = cheatsheets.findIndex(item => item.id === editId);
                cheatsheets[index] = entry;
                document.getElementById('submitBtn').innerHTML = "✨ Add Snippet Below";
            } else {
                cheatsheets.push(entry);
            }

            saveLocalState();
            clearInputs();
            updateHeaderOptions();
            renderCheatsheets();
            showToast(editId ? "✅ Updated!" : "✅ Added!");
        }

        function editEntry(id) {
            const entry = cheatsheets.find(item => item.id === id);
            if (entry) {
                document.getElementById('headerInput').value = entry.header === 'General' ? '' : entry.header;
                document.getElementById('tagInput').value = entry.tags || '';
                document.getElementById('codeInput').value = entry.code;
                document.getElementById('outputInput').value = entry.output;
                document.getElementById('explanationInput').value = entry.explanation || '';

                if (entry.image) {
                    currentAttachedImageBase64 = entry.image;
                    document.getElementById('imagePreview').src = currentAttachedImageBase64;
                    document.getElementById('imagePreview').style.display = 'block';
                    document.getElementById('clearImageBtn').style.display = 'inline-block';
                } else { clearImageUpload(); }

                document.getElementById('editId').value = entry.id;
                document.getElementById('submitBtn').innerHTML = "💾 Update Snippet";
                document.querySelector('.input-panel').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function deleteEntry(id) {
            if (confirm("Are you sure you want to delete this snippet?")) {
                cheatsheets = cheatsheets.filter(item => item.id !== id);
                saveLocalState();
                updateHeaderOptions();
                renderCheatsheets();
                showToast("🗑️ Deleted.");
            }
        }

        function clearInputs() {
            if (!isHeaderPinned) { document.getElementById('headerInput').value = ''; }
            document.getElementById('tagInput').value = '';
            document.getElementById('codeInput').value = '';
            document.getElementById('outputInput').value = '';
            document.getElementById('explanationInput').value = '';
            document.getElementById('editId').value = '';
            clearImageUpload();
            document.getElementById('submitBtn').innerHTML = "✨ Add Snippet Below";
        }

        // --- IMAGE HANDLING ---
        document.getElementById('imageFileInput').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (event) {
                    currentAttachedImageBase64 = event.target.result;
                    document.getElementById('imagePreview').src = currentAttachedImageBase64;
                    document.getElementById('imagePreview').style.display = 'block';
                    document.getElementById('clearImageBtn').style.display = 'inline-block';
                };
                reader.readAsDataURL(file);
            }
        });

        function clearImageUpload() {
            currentAttachedImageBase64 = null;
            document.getElementById('imageFileInput').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imagePreview').src = '';
            document.getElementById('clearImageBtn').style.display = 'none';
        }

        // ==========================================
        //  MARKDOWN PARSER
        // ==========================================
        function parseMarkdown(text) {
            if (!text) return '';
            let html = text;
            html = html.replace(/^###### (.*$)/gim, '<h6>$1</h6>');
            html = html.replace(/^##### (.*$)/gim, '<h5>$1</h5>');
            html = html.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            html = html.replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/gim, '<em>$1</em>');
            if (!html.match(/^<h[1-6]>/)) { html = `<h3>${html}</h3>`; }
            return html;
        }

        function cleanText(text) { return text.replace(/#/g, '').replace(/\*/g, '').trim(); }

        // ==========================================
        //  RENDER ENGINE
        // ==========================================
        function generateCheatsheetCardsHTML(isExport = false) {
            const groups = {};
            const groupOrder = [];

            cheatsheets.forEach(item => {
                const h = item.header;
                if (!groups[h]) {
                    groups[h] = { id: 'sec-' + Math.random().toString(36).substr(2, 6), items: [] };
                    groupOrder.push(h);
                }
                groups[h].items.push(item);
            });

            let finalHTML = '';
            let tocData = [];

            groupOrder.forEach(headerText => {
                const group = groups[headerText];

                let cardHTML = `<div class="card" id="${group.id}">
                    <div class="card-header-text">${parseMarkdown(headerText)}</div>
                `;
                tocData.push({ id: group.id, title: cleanText(headerText) });

                group.items.forEach(item => {
                    cardHTML += `<div class="snippet-container">`;

                    let tagsHTML = '';
                    if (item.tags) {
                        const tagArr = item.tags.split(',').map(t => t.trim()).filter(Boolean);
                        if (tagArr.length > 0) {
                            tagsHTML = `<div class="tags-container">` + tagArr.map(t =>
                                `<span class="tag-pill">${escapeHTML(t)}</span>`).join('') + `</div>`;
                        }
                    }

                    cardHTML += `<div class="snippet-top-bar">${tagsHTML}`;

                    if (!isExport) {
                        cardHTML += `<div class="snippet-actions">
                            <button class="edit" onclick="editEntry('${item.id}')">Edit</button>
                            <button class="danger" onclick="deleteEntry('${item.id}')">Delete</button>
                        </div>`;
                    }
                    cardHTML += `</div><div class="card-content-grid">`;

                    if (item.code) {
                        cardHTML += `
                            <div class="io-block">
                                <div class="block-label">Code / Input</div>
                                <div class="code-container">
                                    <button class="copy-btn" onclick="copyText(this, \`${escapeHTML(item.code).replace(/`/g, '\\`')}\`)">Copy</button>
                                    <div class="code-block"><pre>${escapeHTML(item.code)}</pre></div>
                                </div>
                            </div>
                        `;
                    }

                    if (item.output || item.image) {
                        cardHTML +=
                            `<div class="io-block"><div class="block-label">Output</div><div class="code-container">`;
                        if (item.output) {
                            cardHTML += `
                                <button class="copy-btn" onclick="copyText(this, \`${escapeHTML(item.output).replace(/`/g, '\\`')}\`)">Copy</button>
                                <div class="code-block"><pre>${escapeHTML(item.output)}</pre></div>
                            `;
                        }
                        if (item.image) {
                            const imgClass = item.output ? "output-image" : "output-image only-image";
                            cardHTML += `<img src="${item.image}" class="${imgClass}" alt="Output">`;
                        }
                        cardHTML += `</div></div>`;
                    }

                    cardHTML += `</div>`; // Close grid

                    if (item.explanation) {
                        cardHTML += `<div class="explanation-block">${parseMarkdown(item.explanation)}</div>`;
                    }
                    cardHTML += `</div>`; // Close snippet container
                });
                cardHTML += `</div>`; // Close card
                finalHTML += cardHTML;
            });

            return { html: finalHTML, toc: tocData };
        }

        function renderCheatsheets() {
            const container = document.getElementById('cheatsheetContainer');
            const tocList = document.getElementById('toc-list');

            const generated = generateCheatsheetCardsHTML(false);
            container.innerHTML = generated.html;

            // Render TOC
            tocList.innerHTML = '';
            generated.toc.forEach(item => {
                tocList.innerHTML +=
                    `<li><a href="#${item.id}" onclick="document.getElementById('toc-sidebar').classList.remove('open');">${escapeHTML(item.title)}</a></li>`;
            });
        }

        window.copyText = function (btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                const orig = btn.innerText;
                btn.innerText = "Copied!";
                btn.style.background = "var(--btn-primary)";
                btn.style.color = "white";
                setTimeout(() => {
                    btn.innerText = orig;
                    btn.style.background = "";
                    btn.style.color = "";
                }, 2000);
            });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag));
        }

        // ==========================================
        //  RESET WORKSPACE
        // ==========================================
        function resetWorkspace() {
            if (!confirm("Are you sure you want to reset the entire workspace? All unsaved data will be lost.")) return;

            // Clear localStorage
            localStorage.removeItem('my_cheatsheet_data');
            localStorage.removeItem('cheatsheet_title');

            // Reset state
            cheatsheets = [];
            currentAttachedImageBase64 = null;
            globalTitle = "My Cheatsheet";

            // Update UI
            document.getElementById('page-title').innerHTML = `📚 ${globalTitle}`;
            document.title = globalTitle;

            // Clear inputs and render
            clearInputs();
            updateHeaderOptions();
            renderCheatsheets();

            // Reset importer UI
            const uploadZone = document.getElementById('uploadZone');
            const resultsSection = document.getElementById('ipynbResultsSection');
            if (uploadZone) uploadZone.style.display = 'block';
            if (resultsSection) resultsSection.classList.remove('active');
            document.getElementById('fileInput').value = '';
            document.getElementById('ipynbStatusFileName').textContent = '—';
            document.getElementById('ipynbStatItems').textContent = '0 items';
            document.getElementById('ipynbStatusDot').className = 'dot';

            // Close importer section
            document.getElementById('ipynbConverterSection').classList.remove('open');

            showToast("🧹 Workspace reset. Ready for new imports!");
        }

        // ==========================================
        //  IPYNB / MD IMPORTER ENGINE
        // ==========================================
        (function initIPYNBLogic() {
            let currentJson = null;
            const fileInput = document.getElementById('fileInput');
            const uploadZone = document.getElementById('uploadZone');
            const resultsSection = document.getElementById('ipynbResultsSection');
            const statItems = document.getElementById('ipynbStatItems');
            const fileNameDisplay = document.getElementById('ipynbStatusFileName');
            const statusDot = document.getElementById('ipynbStatusDot');

            const btnImport = document.getElementById('btnImportToCheatsheet');
            const btnClear = document.getElementById('ipynbBtnClear');

            function resetIPYNB() {
                currentJson = null;
                fileInput.value = '';
                resultsSection.classList.remove('active');
                uploadZone.style.display = 'block';
                fileNameDisplay.textContent = '—';
                statItems.textContent = '0 items';
                statusDot.className = 'dot';
            }

            function handleFile(file) {
                if (!file) return;
                const ext = file.name.toLowerCase();
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        let result;
                        if (ext.endsWith('.ipynb')) {
                            const parsed = JSON.parse(e.target.result);
                            if (!parsed.cells) throw new Error("Format not recognized. Missing 'cells'.");
                            result = parseNotebook(parsed, file.name);
                        } else if (ext.endsWith('.md') || ext.endsWith('.markdown')) {
                            result = parseMarkdownFile(e.target.result, file.name);
                        } else {
                            throw new Error("Unsupported file format.");
                        }

                        currentJson = result;
                        uploadZone.style.display = 'none';
                        resultsSection.classList.add('active');
                        statusDot.className = 'dot success';
                        fileNameDisplay.textContent = file.name;
                        statItems.textContent = currentJson.data.length + ' snippets found';
                        showToast('✅ File parsed successfully');
                    } catch (err) { showToast('❌ Error parsing file: ' + err.message); }
                };
                reader.readAsText(file);
            }

            function parseNotebook(notebookJson, fileName) {
                const cells = notebookJson.cells || [];
                let currentHeader = '';
                const dataItems = [];
                const baseTimestamp = Date.now();
                let itemIndex = 0;

                for (const cell of cells) {
                    if (cell.cell_type === 'markdown') {
                        const src = Array.isArray(cell.source) ? cell.source.join('') : (cell.source || '');
                        const headingMatch = src.trim().match(/^(#{1,6})\s+(.+)/);
                        if (headingMatch) currentHeader = '#'.repeat(headingMatch[1].length) + ' ' + headingMatch[2]
                            .trim();
                    } else if (cell.cell_type === 'code') {
                        const src = Array.isArray(cell.source) ? cell.source.join('') : (cell.source || '');
                        let tags = '';
                        const lines = src.split('\n');
                        for (const line of lines) {
                            if (line.trim().startsWith('#')) {
                                const commentText = line.trim().replace(/^#\s*/, '').trim();
                                if (commentText) { tags = commentText; break; }
                            } else if (line.trim() !== '') { break; }
                        }

                        let header = currentHeader;
                        if (!header && tags) header = '# ' + tags;
                        else if (!header) header = '# Code Segment';

                        let outputText = '';
                        let imageData = null;
                        const outputs = cell.outputs || [];
                        for (const output of outputs) {
                            if (output.output_type === 'stream') {
                                outputText += Array.isArray(output.text) ? output.text.join('') : (output.text || '');
                            } else if (output.output_type === 'execute_result' || output.output_type ===
                                'display_data') {
                                const data = output.data || {};
                                if (data['image/png'] && !imageData) imageData = 'data:image/png;base64,' + data[
                                    'image/png'];
                                if (data['text/plain']) {
                                    if (outputText && !outputText.endsWith('\n')) outputText += '\n';
                                    outputText += Array.isArray(data['text/plain']) ? data['text/plain'].join('') :
                                        data['text/plain'];
                                }
                            } else if (output.output_type === 'error') {
                                if (outputText && !outputText.endsWith('\n')) outputText += '\n';
                                outputText += (output.ename || 'Error') + ': ' + (output.evalue || '');
                            }
                        }

                        dataItems.push({
                            id: 'item-' + (baseTimestamp + itemIndex), header: header, tags: tags,
                            code: src, output: outputText.trim(), image: imageData, explanation: ''
                        });
                        itemIndex++;
                    }
                }
                return { data: dataItems };
            }

            function parseMarkdownFile(content, fileName) {
                const dataItems = [];
                const baseTimestamp = Date.now();
                const headerRegex = /^(#{1,6})\s+(.*)$/gm;
                let match;
                let headers = [];

                while ((match = headerRegex.exec(content)) !== null) {
                    headers.push({ level: match[1].length, text: match[2].trim(), index: match.index, endIndex: -1 });
                }

                if (headers.length === 0) headers.push({ level: 1, text: fileName, index: 0, endIndex: content.length });
                for (let i = 0; i < headers.length; i++) headers[i].endIndex = (i + 1 < headers.length) ? headers[i + 1]
                    .index : content.length;

                for (const h of headers) {
                    const sectionContent = content.substring(h.index + h.text.length + h.level, h.endIndex).trim();
                    if (!sectionContent) continue;

                    const codeBlockRegex = /```(\w*)\n([\s\S]*?)```/gm;
                    let codeMatch;
                    let codeBlocks = [];
                    while ((codeMatch = codeBlockRegex.exec(sectionContent)) !== null) {
                        codeBlocks.push({
                            lang: codeMatch[1], code: codeMatch[2].trim(), start: codeMatch.index,
                            end: codeMatch.index + codeMatch[0].length
                        });
                    }

                    const headerText = '#'.repeat(h.level) + ' ' + h.text;

                    if (codeBlocks.length === 0) {
                        dataItems.push({
                            id: 'item-' + (baseTimestamp + dataItems.length), header: headerText,
                            tags: '', code: '', output: '', image: null, explanation: sectionContent
                        });
                    } else {
                        for (const cb of codeBlocks) {
                            const before = sectionContent.substring(0, cb.start).trim();
                            const after = sectionContent.substring(cb.end).trim();
                            dataItems.push({
                                id: 'item-' + (baseTimestamp + dataItems.length), header: headerText,
                                tags: cb.lang || '', code: cb.code, output: '', image: null,
                                explanation: (before + '\n\n' + after).trim()
                            });
                        }
                    }
                }
                return { data: dataItems };
            }

            // Bind upload zones
            uploadZone.addEventListener('click', (e) => { if (e.target !== fileInput) fileInput.click(); });
            fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.classList.add('drag-over');
            });
            uploadZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                uploadZone.classList.remove('drag-over');
            });
            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.classList.remove('drag-over');
                handleFile(e.dataTransfer.files[0]);
            });

            btnClear.addEventListener('click', function () {
                resetIPYNB();
                showToast('🔄 Cleared.');
            });

            btnImport.addEventListener('click', function () {
                if (!currentJson || !currentJson.data || currentJson.data.length === 0) return showToast(
                    '⚠️ No data to import.');
                let added = 0;
                for (const item of currentJson.data) {
                    if (cheatsheets.some(ex => ex.id === item.id)) item.id = 'item-' + Date.now() + '-' + Math
                        .random().toString(36).substr(2, 4);
                    cheatsheets.push(item);
                    added++;
                }
                saveLocalState();
                updateHeaderOptions();
                renderCheatsheets();
                showToast('✅ Imported ' + added + ' items into cheatsheet!');
                resetIPYNB();
                document.getElementById('ipynbConverterSection').classList.remove('open'); // Auto close
            });

            resetIPYNB();
        })();

        // ==========================================
        //  EXPORTS & SAVES
        // ==========================================
        function getSafeFilename(ext) { return `${globalTitle.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.${ext}`; }

        function exportStateJSON() {
            if (cheatsheets.length === 0) return showToast("⚠️ Nothing to save!");
            const dataStr = JSON.stringify({ title: globalTitle, data: cheatsheets }, null, 2);
            triggerDownload(dataStr, "application/json", getSafeFilename("json"));
        }

        function importStateJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (parsed.data && Array.isArray(parsed.data)) {
                        cheatsheets = parsed.data;
                        if (parsed.title) {
                            globalTitle = parsed.title;
                            localStorage.setItem('cheatsheet_title', globalTitle);
                            document.getElementById('page-title').innerHTML = `📚 ${globalTitle}`;
                            document.title = globalTitle;
                        }
                    } else if (Array.isArray(parsed)) { cheatsheets = parsed; } else {
                        throw new Error(
                            "Invalid Format");
                    }

                    saveLocalState();
                    updateHeaderOptions();
                    renderCheatsheets();
                    showToast("✅ File Loaded!");
                } catch (err) { showToast("❌ Invalid JSON file."); }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function exportToMarkdown() {
            if (cheatsheets.length === 0) return showToast("⚠️ Nothing to export!");
            let md = `# ${globalTitle}\n\n`;
            cheatsheets.forEach(item => {
                md += `${item.header}\n`;
                if (item.tags) md += `*Tags: ${item.tags}*\n\n`;
                if (item.code) md += `**Code:**\n\`\`\`\n${item.code}\n\`\`\`\n\n`;
                if (item.output) md += `**Output:**\n\`\`\`\n${item.output}\n\`\`\`\n\n`;
                if (item.image) md += `> *[Visualization image attached - View in HTML export]*\n\n`;
                if (item.explanation) md += `> **Explanation:** ${item.explanation}\n\n`;
                md += `---\n\n`;
            });
            triggerDownload(md, "text/markdown", getSafeFilename("md"));
        }

        function exportToHTML() {
            if (cheatsheets.length === 0) return showToast("⚠️ Nothing to export!");
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
            const generated = generateCheatsheetCardsHTML(true);
            const css = document.querySelector('style').innerHTML;

            let tocHTML = '';
            generated.toc.forEach(item => {
                tocHTML +=
                    `<li><a href="#${item.id}" onclick="document.getElementById('toc-sidebar').classList.remove('open');">${escapeHTML(item.title)}</a></li>`;
            });

            let html =
                `<!DOCTYPE html><html lang="en" data-theme="${currentTheme}">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${escapeHTML(globalTitle)}</title><style>${css}</style></head>
<body>
    <div class="sticky-header"><h1>📚 ${escapeHTML(globalTitle)}</h1>
        <div class="export-btns"><button onclick="toggleTheme()" class="secondary">🌓 Theme</button></div>
    </div>
    <div id="toc-sidebar"><div class="toc-header"><span>📑 Contents</span><button id="toc-close-btn" class="danger">✕</button></div><ul id="toc-list">${tocHTML}</ul></div>
    <button id="toc-toggle-main" class="visible" title="Toggle Table of Contents">📑</button>
    <div class="container"><div class="masonry-grid">${generated.html}</div></div>
    <script>
        window.onload = function() { 
            const t = localStorage.getItem('exported_theme') || '${currentTheme}'; document.documentElement.setAttribute('data-theme', t); 
            const sidebar = document.getElementById('toc-sidebar');
            document.getElementById('toc-toggle-main').onclick = () => sidebar.classList.toggle('open');
            document.getElementById('toc-close-btn').onclick = () => sidebar.classList.remove('open');
        };
        function toggleTheme() { const t = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light'; document.documentElement.setAttribute('data-theme', t); localStorage.setItem('exported_theme', t); }
        function copyText(b, t) { navigator.clipboard.writeText(t).then(() => { const o = b.innerText; b.innerText="Copied!"; b.style.background="var(--btn-primary)"; b.style.color="white"; setTimeout(() => { b.innerText=o; b.style.background=""; b.style.color=""; }, 2000); }); }
    <\/script>
</body></html>`;
            triggerDownload(html, "text/html", getSafeFilename("html"));
        }

        function triggerDownload(content, type, filename) {
            const blob = new Blob([content], { type: type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>

</html>
