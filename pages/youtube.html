<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Courses - Data Portfolio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* Clean Grid Layout for YouTube Buttons */
    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
      gap: 25px;
      margin-top: 20px;
    }

    /* Style the links to look like premium clickable cards */
    .course-card {
      background-color: var(--header-bg);
      border: 1px solid var(--shadow-color);
      border-radius: 12px;
      padding: 25px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 6px var(--shadow-color);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      text-decoration: none; /* Removes the standard blue link underline */
    }

    .course-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(255, 0, 0, 0.15); /* YouTube red shadow */
      border-color: #ff0000; 
    }

    .course-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .course-badge {
      font-size: 0.8rem;
      background-color: rgba(255, 0, 0, 0.1);
      color: #ff0000;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 600;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .course-title {
      font-size: 1.25rem;
      color: var(--text-color);
      margin-bottom: 10px;
      line-height: 1.4;
      font-weight: 600;
    }

    .course-desc {
      font-size: 0.95rem;
      color: var(--quote-color);
      margin-bottom: 20px;
      line-height: 1.6;
      flex-grow: 1; /* Pushes the button to the bottom evenly */
    }

    .yt-redirect-btn {
      background-color: #ff0000;
      color: #ffffff;
      border: none;
      padding: 10px 0;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: background-color 0.3s ease;
    }

    .course-card:hover .yt-redirect-btn {
      background-color: #cc0000; /* Darker red on hover */
    }
  </style>
</head>
<body>

  <header class="top-header">
    <div class="logo-section">
      <a href="../index.html" title="Back to Home"><i class="fas fa-arrow-left"></i> Home</a>
    </div>
    <div class="quote-section">
      <p id="quote-display">"Anyone who stops learning is old, whether at twenty or eighty. – Henry Ford"</p>
    </div>
    <div class="info-section">
      <button id="theme-toggle" title="Toggle Dark/Light Mode"><i class="fas fa-moon"></i></button>
      <div class="time-weather">
        <span id="time-display">--:--:--</span>
      </div>
    </div>
  </header>

  <main style="padding-top: 40px; padding-bottom: 80px; max-width: 1200px; margin: 0 auto;">
    
    <div style="text-align: center; margin-bottom: 50px;">
      <h1 style="font-family: 'Amatic SC', cursive; font-size: 5rem; color: var(--text-color);">Curated <span style="color: #ff0000;">YouTube</span> Courses</h1>
      <p style="color: var(--quote-color); font-size: 1.1rem;">My personal video roadmap. Click any course to watch it directly on YouTube.</p>
    </div>

    <div id="course-container" class="course-grid"></div>

  </main>

  <script src="../js/script.js"></script>
  
  <script>
    // 1. Your EXACT 10 Links (Unmodified)
    const ytData = [
      {
        title: "1. Python Full Course Playlist",
        desc: "A comprehensive playlist covering Python fundamentals, data structures, and advanced concepts.",
        url: "https://youtube.com/playlist?list=PLACGt6Ta1ve2hnz8TWXzb9Qd4P6rRx5Wf&si=ZbLRrNjV_krFTReP"
      },
      {
        title: "2. SQL Database Bootcamp",
        desc: "Learn how to write efficient SQL queries, manage databases, and extract valuable data.",
        url: "https://youtu.be/u2zsY-2uZiE?si=BYMmZeP6dlG9z1jW"
      },
      {
        title: "3. Python Object-Oriented Programming",
        desc: "Mastering OOP concepts in Python: Classes, Inheritance, and Methods.",
        url: "https://youtu.be/Vfo5le26IhY?si=RDu6ZPZ8n7qIxOiT"
      },
      {
        title: "4. Advanced Excel for Data Analysis",
        desc: "Learn advanced formulas, pivot tables, and data manipulation directly in Excel.",
        url: "https://www.youtube.com/watch?v=SSKVgrwhzus"
      },
      {
        title: "5. Machine Learning Algorithms",
        desc: "A playlist exploring supervised and unsupervised learning models in depth.",
        url: "https://youtube.com/playlist?list=PLBTZqjSKn0IfuIqbMIqzS-waofsPHMS0E&si=ncFXDIHgUTHhuw7d"
      },
      {
        title: "6. Stanford CS229: Machine Learning",
        desc: "The famous Stanford University course covering advanced machine learning theory.",
        url: "https://youtube.com/playlist?list=PLoROMvodv4rPP6braWoRt5UCXYZ71GZIQ&si=AT5_jQXEvn9_zDLR"
      },
      {
        title: "7. Neural Networks & Deep Learning",
        desc: "Deep dive into Artificial Neural Networks, backpropagation, and Deep Learning theory.",
        url: "https://youtube.com/playlist?list=PL8dPuuaLjXtNM_Y-bUAhblSAdWRnmBUcr&si=KU-F-eZYMas6bj1-"
      },
      {
        title: "8. Exploratory Data Analysis (EDA)",
        desc: "Learn how to visually and statistically explore datasets to find hidden patterns.",
        url: "https://youtu.be/Rq5gJVxz55Q?si=ZT13dSB78k8OXawi"
      },
      {
        title: "9. Data Wrangling with Pandas",
        desc: "Using Python's Pandas library to clean, merge, and manipulate complex data structures.",
        url: "https://youtu.be/K3pXnbniUcM?si=7QKiZqcYo4QFCqMm"
      },
      {
        title: "10. Data Science End-to-End Projects",
        desc: "A playlist putting all the skills together to build real-world data science portfolios.",
        url: "https://youtube.com/playlist?list=PLNcg_FV9n7qZge4KDGqGtqgiuVuhVZWzu&si=FUfxMPtCAoB1ptwM"
      }
    ];

    const container = document.getElementById('course-container');

    // 2. Build the Clickable Cards
    ytData.forEach((course) => {
      // Create an 'a' (anchor) tag so the entire card functions as a link
      const card = document.createElement('a');
      card.className = 'course-card';
      card.href = course.url;
      card.target = "_blank"; // Opens the link safely in a NEW tab

      // Automatically detect if it's a playlist or a single video for the icon
      const isPlaylist = course.url.includes("list=");
      const iconClass = isPlaylist ? "fas fa-list-ol" : "fas fa-play-circle";
      const badgeText = isPlaylist ? "Playlist" : "Video";

      card.innerHTML = `
        <div class="course-header">
          <span class="course-badge"><i class="${iconClass}"></i> ${badgeText}</span>
        </div>
        <h3 class="course-title">${course.title}</h3>
        <p class="course-desc">${course.desc}</p>
        <div class="yt-redirect-btn">
          Watch on YouTube <i class="fas fa-external-link-alt" style="font-size: 0.85rem;"></i>
        </div>
      `;

      container.appendChild(card);
    });
  </script>
</body>
</html>
