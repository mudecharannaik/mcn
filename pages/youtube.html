<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Courses - Data Portfolio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* Clean Grid Layout for YouTube Buttons */
    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
      gap: 25px;
      margin-top: 20px;
    }

    /* Style the links to look like premium clickable cards */
    .course-card {
      background-color: var(--header-bg);
      border: 1px solid var(--shadow-color);
      border-radius: 12px;
      padding: 25px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 6px var(--shadow-color);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      text-decoration: none; /* Removes the standard blue link underline */
    }

    .course-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(255, 0, 0, 0.15); /* YouTube red shadow */
      border-color: #ff0000; 
    }

    .course-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .course-badge {
      font-size: 0.8rem;
      background-color: rgba(255, 0, 0, 0.1);
      color: #ff0000;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 600;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .course-title {
      font-size: 1.25rem;
      color: var(--text-color);
      margin-bottom: 10px;
      line-height: 1.4;
      font-weight: 600;
    }

    .course-desc {
      font-size: 0.95rem;
      color: var(--quote-color);
      margin-bottom: 20px;
      line-height: 1.6;
      flex-grow: 1; /* Pushes the button to the bottom evenly */
    }

    .yt-redirect-btn {
      background-color: #ff0000;
      color: #ffffff;
      border: none;
      padding: 10px 0;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: background-color 0.3s ease;
    }

    .course-card:hover .yt-redirect-btn {
      background-color: #cc0000; /* Darker red on hover */
    }
  </style>
</head>
<body>

  <header class="top-header">
    <div class="logo-section">
      <a href="../index.html" title="Back to Home"><i class="fas fa-arrow-left"></i> Home</a>
    </div>
    <div class="quote-section">
      <p id="quote-display">"Anyone who stops learning is old, whether at twenty or eighty. – Henry Ford"</p>
    </div>
    <div class="info-section">
      <button id="theme-toggle" title="Toggle Dark/Light Mode"><i class="fas fa-moon"></i></button>
      <div class="time-weather">
        <span id="time-display">--:--:--</span>
      </div>
    </div>
  </header>

  <main style="padding-top: 40px; padding-bottom: 80px; max-width: 1200px; margin: 0 auto;">
    
    <div style="text-align: center; margin-bottom: 50px;">
      <h1 style="font-family: 'Amatic SC', cursive; font-size: 5rem; color: var(--text-color);">Curated <span style="color: #ff0000;">YouTube</span> Courses</h1>
      <p style="color: var(--quote-color); font-size: 1.1rem;">My personal video roadmap. Click any course to watch it directly on YouTube.</p>
    </div>

    <div id="course-container" class="course-grid"></div>

  </main>

  <script src="../js/script.js"></script>
  
  <script>
    // 1. Your EXACT 10 Links (Unmodified)
    const ytData = [
      {
        title: "1. Python Full Course for Beginners (13 Hours) – From Zero to Hero",
        desc: "Learn Python from scratch in this complete 13-hour course designed for beginners who want to build real programming confidence.",
        url: "https://youtu.be/Rq5gJVxz55Q?si=iwOQJdGLgBSloxFc"
      },
      {
        title: "2. SQL Full Course for Beginners (30 Hours) – From Zero to Hero",
        desc: " high-quality SQL course so you can master SQL for data analysis & data engineering",
        url: "https://youtu.be/SSKVgrwhzus?si=owvJzjtiKs1SB7Gy"
      },
      {
        title: "3. Tableau Ultimate Full Course (21 Hours) for Beginners - From Zero to HERO",
        desc: " high-quality course that covers everything about Tableau using visual learning. The best part? It’s 100% free ",
        url: "https://youtu.be/K3pXnbniUcM?si=Z2MAFS1CS1S2Yybp"
      },
      {
        title: "4. Power BI Ultimate Course",
        desc: "Welcome to your *high quality Power BI course*  This course takes you from the basics to advanced skills with clear visuals and real examples.",
        url: "https://youtube.com/playlist?list=PLNcg_FV9n7qZge4KDGqGtqgiuVuhVZWzu&si=GoCCSd1DS8q55qm-"
      },
      {
        title: "5. Complex SQL Questions for Interview Preparation",
        desc: "This playlist contains scenario based SQL problems. After solving these you should be able to ace any SQL interview. As and when I find a good problem, i will add it to this playlist.",
        url: "https://youtube.com/playlist?list=PLBTZqjSKn0IeKBQDjLmzisazhqQy4iGkb&si=TLBeBdUU8D84ty5w"
      },
      {
        title: "6. SQL Medium Complex Interview Problems",
        desc: "SQL Medium Complex Interview Problems.",
        url: "https://youtube.com/playlist?list=PLBTZqjSKn0IfuIqbMIqzS-waofsPHMS0E&si=yS4KaeyHgY0rwC29"
      },
      {
        title: "7. 70 Leetcode problems in 5+ hours (every data structure) (full tutorial)",
        desc: "In this video we go through the solution and problem solving logic, walking through pretty much every leetcode question you need to know to pass a tech/programming interview, or to just become a better software engineer. .",
        url: "https://youtu.be/lvO88XxNAzs?si=woZHBcML3E3r0q-P"
      },
      {
        title: "8. NeetCode 150 Full Playlist in Telugu | LeetCode DSA Solutions with Python | Step-by-Step Explanations",
        desc: "Unlock your DSA mastery with the complete NeetCode 150 playlist in Telugu! I solved every problem using Python and explained each concept in simple, clear Telugu so anyone can follow and build strong problem-solving skills..",
        url: "https://youtube.com/playlist?list=PL10if0bhBdg-7t2afebQLXsIC--yLsG30&si=7s8A-MSCKHHEYsJZ"
      },
      {
        title: "9. 2026| ALL Hackerrank SQL Solutions in ONE Video| Hackerrank sql | sql tutorial | SQL full course|SQL",
        desc: "sql tutorial,Complete hackerrank sql question,sql crash course,sql,sql tutorial for beginners .",
        url: "https://www.youtube.com/watch?v=A6WT5sw6UBA"
      },
      {
        title: "10. Statistics for Data Analytics/ Data Science | Complete Statistics Tutorial",
        desc: "This playlist covers all the important topics in statistics including probability, descriptive statistics and inferential statistics. It is designed for everyone who is preparing for the data analysis and data science..",
        url: "https://youtube.com/playlist?list=PLunlGNVWDAaY7AeDDzTeu4-DD3g7zmAXs&si=GHYEBkCUx0WQS3Nl"
      },
      {
        title: "11. Machine Learning Specialization by Andrew Ng",
        desc: "Machine Learning Specialization by Andrew Ng.",
        url: "https://youtube.com/playlist?list=PLkDaE6sCZn6FNC6YRfRQc_FbeQrF8BwGI&si=KRe2bENg7Z3ePADu"
      },
      {
        title: "12. Statistics for Data Science | Probability and Statistics | Statistics Tutorial | Ph.D. (Stanford)",
        desc: "Statistics for Data Science | Probability and Statistics | Statistics Tutorial | Ph.D. (Stanford)",
        url: "https://youtu.be/Vfo5le26IhY?si=eEu-PZKlSxmWbvzc"
      }
    ];

    const container = document.getElementById('course-container');

    // 2. Build the Clickable Cards
    ytData.forEach((course) => {
      // Create an 'a' (anchor) tag so the entire card functions as a link
      const card = document.createElement('a');
      card.className = 'course-card';
      card.href = course.url;
      card.target = "_blank"; // Opens the link safely in a NEW tab

      // Automatically detect if it's a playlist or a single video for the icon
      const isPlaylist = course.url.includes("list=");
      const iconClass = isPlaylist ? "fas fa-list-ol" : "fas fa-play-circle";
      const badgeText = isPlaylist ? "Playlist" : "Video";

      card.innerHTML = `
        <div class="course-header">
          <span class="course-badge"><i class="${iconClass}"></i> ${badgeText}</span>
        </div>
        <h3 class="course-title">${course.title}</h3>
        <p class="course-desc">${course.desc}</p>
        <div class="yt-redirect-btn">
          Watch on YouTube <i class="fas fa-external-link-alt" style="font-size: 0.85rem;"></i>
        </div>
      `;

      container.appendChild(card);
    });
  </script>
</body>
</html>
